<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actívate Perú</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bcp: {
              blue:  '#003DA5',
              orange: '#ea551c',
              dark:  '#002d7a',
              light: '#009FE3',
              pale:  '#e8f0fb',
              lila:  '#5C2D91',
              lilap: '#f3eefa',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #map { height: 320px; }
  </style>
</head>
<body class="bg-bcp-pale min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-bcp-blue text-white py-6 px-4 text-center shadow-md">
    <h1 class="text-3xl font-bold tracking-tight">Actívate Perú</h1>
    <p class="mt-1 text-bcp-light text-sm">Encuentra tu espacio de participación en 3 preguntas</p>
    <div class="flex items-center justify-center gap-2 mt-2">
      <p class="text-xs text-white/60">Con el respaldo del Patronato BCP</p>
      <span id="server-status" class="hidden text-xs px-2 py-0.5 rounded-full bg-yellow-400/20 text-yellow-200">⏳ conectando...</span>
    </div>
  </header>

  <!-- Form -->
  <main class="max-w-xl mx-auto px-4 py-8">
    <div id="form-section" class="bg-white rounded-2xl shadow-md p-6 space-y-6">

      <!-- Pregunta 1 -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          1. ¿Qué tema te importa más en tu comunidad?
        </label>
        <input
          id="causa"
          type="text"
          placeholder='Ej: "el agua", "la educación de mi barrio", "espacios para jóvenes"'
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-bcp-light focus:border-bcp-light transition"
        />
      </div>

      <!-- Pregunta 2 -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          2. ¿En qué provincia estás?
        </label>
        <select id="provincia" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-bcp-light focus:border-bcp-light transition">
          <option value="">Selecciona tu provincia</option>
          <option value="Cusco">Cusco</option>
          <option value="Anta">Anta</option>
          <option value="Calca">Calca</option>
          <option value="Canas">Canas</option>
          <option value="Canchis">Canchis</option>
          <option value="Chumbivilcas">Chumbivilcas</option>
          <option value="Espinar">Espinar</option>
          <option value="La Convención">La Convención</option>
          <option value="Paruro">Paruro</option>
          <option value="Paucartambo">Paucartambo</option>
          <option value="Quispicanchi">Quispicanchi</option>
          <option value="Urubamba">Urubamba</option>
        </select>
      </div>

      <!-- Pregunta 3 -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          3. Turno de disponibilidad
        </label>
        <div class="flex gap-3 flex-wrap">
          <button onclick="selectTiempo(this, 'Mañana')" class="tiempo-btn border border-gray-300 rounded-full px-4 py-1.5 text-sm hover:border-[#ea551c] transition">Mañana</button>
          <button onclick="selectTiempo(this, 'Tarde')" class="tiempo-btn border border-gray-300 rounded-full px-4 py-1.5 text-sm hover:border-[#ea551c] transition">Tarde</button>
          <button onclick="selectTiempo(this, 'Noche')" class="tiempo-btn border border-gray-300 rounded-full px-4 py-1.5 text-sm hover:border-[#ea551c] transition">Noche</button>
        </div>
      </div>

      <button
        id="btn-buscar"
        onclick="buscar()"
        class="w-full bg-[#ea551c] hover:bg-[#cf491e] text-white font-semibold py-3 rounded-xl transition text-sm disabled:opacity-60 disabled:cursor-not-allowed"
      > 
        Encontrar mi espacio →
      </button>

      <!-- WhatsApp hint -->
      <p class="text-center text-xs text-gray-400 pt-1">
        También puedes escribirnos por
        <a href="https://wa.me/14155238886?text=hola" target="_blank" rel="noopener"
           class="text-bcp-lila font-semibold hover:underline">WhatsApp</a>
      </p>
    </div>

    <!-- Resultado -->
    <div id="resultado" class="hidden mt-6 space-y-4"></div>

    <!-- Mapa -->
    <div id="map-section" class="hidden mt-6 bg-white rounded-2xl shadow-md overflow-hidden">
      <div class="px-4 pt-4 pb-2">
        <h3 class="font-semibold text-gray-800 text-sm">Organizaciones en tu región</h3>
      </div>
      <div id="map"></div>
    </div>
  </main>

  <footer class="text-center text-xs text-gray-400 pb-8">
    Con datos del RENOJ · Patronato BCP · Hackathon Becas BCP 2026
  </footer>

  <script>
    const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
      ? "http://localhost:8000"
      : "https://activateperu-api.onrender.com";
    let tiempoSeleccionado = "";
    let mapa = null;

    // Wake up Render on page load so it's warm when user submits
    (function pingServer() {
      const badge = document.getElementById("server-status");
      badge.classList.remove("hidden");
      fetch(`${API}/health`, { method: "GET" })
        .then(() => { badge.textContent = "✓ listo"; badge.className = "text-xs px-2 py-0.5 rounded-full bg-green-400/20 text-green-200"; })
        .catch(() => { badge.textContent = "sin conexión"; badge.className = "text-xs px-2 py-0.5 rounded-full bg-red-400/20 text-red-200"; });
    })();

    function selectTiempo(btn, valor) {
      document.querySelectorAll(".tiempo-btn").forEach(b => {
        b.classList.remove("bg-bcp-blue", "text-white", "border-bcp-blue");
        b.classList.add("border-gray-300");
      });
      btn.classList.add("bg-bcp-blue", "text-white", "border-bcp-blue");
      btn.classList.remove("border-gray-300");
      tiempoSeleccionado = valor;
    }

    async function buscar() {
      const causa = document.getElementById("causa").value.trim();
      const provincia = document.getElementById("provincia").value;

      if (!causa || !provincia || !tiempoSeleccionado) {
        alert("Por favor completa las 3 preguntas");
        return;
      }

      const btn = document.getElementById("btn-buscar");
      btn.disabled = true;
      btn.innerHTML = '<span class="inline-block animate-spin mr-2">⏳</span> Buscando tu espacio...';

      try {
        const res = await fetch(`${API}/match`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ causa, provincia, tiempo: tiempoSeleccionado })
        });
        if (!res.ok) throw new Error("server error");
        const data = await res.json();
        mostrarResultado(data.resultados);
        document.getElementById("resultado").scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (e) {
        document.getElementById("resultado").innerHTML =
          `<div class="bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-700">
            No pudimos conectar con el servidor. Espera unos segundos y vuelve a intentar.
          </div>`;
        document.getElementById("resultado").classList.remove("hidden");
      } finally {
        btn.disabled = false;
        btn.textContent = "Encontrar mi espacio →";
      }
    }

    function mostrarResultado(orgs) {
      const container = document.getElementById("resultado");
      container.classList.remove("hidden");

      const top = orgs[0];
      container.innerHTML = `
        <div class="bg-white rounded-2xl shadow-md p-5 border-l-4 border-bcp-blue">
          <div class="flex items-start justify-between">
            <div>
              <span class="text-xs font-semibold uppercase text-bcp-blue tracking-wide">Tu match</span>
              <h2 class="text-lg font-bold text-gray-900 mt-1">${top.nombre}</h2>
              <p class="text-sm text-gray-500 mt-0.5">${top.provincia}, ${top.region}</p>
            </div>
            <span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-full shrink-0 ml-2">
              ${Math.round(top.score * 100)}% afinidad
            </span>
          </div>
          <div class="mt-3 flex gap-2 flex-wrap">
            <span class="bg-bcp-pale text-bcp-blue text-xs px-3 py-1 rounded-full">${top.tematica1}</span>
            ${top.tematica2 ? `<span class="bg-bcp-pale text-bcp-blue text-xs px-3 py-1 rounded-full">${top.tematica2}</span>` : ""}
          </div>
          <div class="mt-4 bg-amber-50 border border-amber-200 rounded-xl p-3">
            <p class="text-xs font-semibold text-amber-800 uppercase tracking-wide">Tu primera acción esta semana</p>
            <p class="text-sm text-amber-900 mt-1">${top.accion_concreta}</p>
          </div>
          <div class="mt-3 flex flex-wrap gap-3">
            ${top.email ? `<a href="mailto:${top.email}" class="text-sm text-bcp-blue hover:text-bcp-dark flex items-center gap-1">✉ <span>${top.email}</span></a>` : ""}
            ${top.web ? `<a href="https://${top.web}" target="_blank" rel="noopener" class="text-sm text-bcp-blue hover:text-bcp-dark flex items-center gap-1">🌐 <span>${top.web}</span></a>` : ""}
          </div>
          <div class="mt-4 pt-4 border-t border-gray-100 flex items-center justify-between">
            <a href="orgs.html" class="text-xs text-bcp-lila hover:underline font-medium">¿Eres líder de una org? Kit de fortalecimiento →</a>
            <button onclick="document.getElementById('form-section').scrollIntoView({behavior:'smooth'})"
              class="text-xs text-gray-400 hover:text-bcp-blue transition">Buscar otra →</button>
          </div>
        </div>
        ${orgs.slice(1, 2).map(o => `
          <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
            <div class="flex justify-between items-center">
              <div>
                <p class="text-sm font-semibold text-gray-800">${o.nombre}</p>
                <p class="text-xs text-gray-400">${o.tematica1}</p>
              </div>
              <span class="text-xs text-bcp-light font-semibold">${Math.round(o.score * 100)}%</span>
            </div>
          </div>
        `).join("")}
      `;

      if (top.lat && top.lng) mostrarMapa(orgs);
    }

    function mostrarMapa(orgs) {
      document.getElementById("map-section").classList.remove("hidden");

      if (!mapa) {
        mapa = L.map("map").setView([orgs[0].lat, orgs[0].lng], 11);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap"
        }).addTo(mapa);
      }

      orgs.forEach((o, i) => {
        if (!o.lat || !o.lng) return;
        const color = i === 0 ? "#003DA5" : "#009FE3";
        const marker = L.circleMarker([o.lat, o.lng], {
          radius: i === 0 ? 12 : 8,
          fillColor: color,
          color: "#fff",
          weight: 2,
          fillOpacity: 0.9
        }).addTo(mapa);
        marker.bindPopup(`<b>${o.nombre}</b><br>${o.tematica1}`);
        if (i === 0) marker.openPopup();
      });
    }
  </script>
</body>
</html>
